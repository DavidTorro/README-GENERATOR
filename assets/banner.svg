<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" font-family="'Helvetica Neue', -apple-system, 'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="hsl(220, 100%, 99%)"/><stop offset="1" stop-color="hsl(250, 85%, 94%)"/>
    </linearGradient>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="70"/></filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="hsl(220, 80%, 50%)" flood-opacity="0.18"/>
    </filter>
    <style>
      .fade-1 { opacity: 0; animation: fadeIn 1.1s ease 0.1s forwards; }
      .fade-2 { opacity: 0; animation: fadeIn 1.1s ease 0.4s forwards; }
      .float-title { animation: floatTitle 7s ease-in-out 1.4s infinite; }
      .dot-a { animation: breathe 5s ease-in-out infinite; }
      .dot-b { animation: breathe 7s ease-in-out 2s infinite; }
      .dot-c { animation: breathe 6s ease-in-out 3.5s infinite; }
      .blob-a { animation: driftA 26s ease-in-out infinite; }
      .blob-b { animation: driftB 32s ease-in-out infinite; }
      .blob-c { animation: driftC 22s ease-in-out infinite; }
      .spin-a { animation: spin 16s linear infinite; }
      .spin-b { animation: spinRev 26s linear infinite; }
      .wave-a { animation: waveSlide 20s linear infinite; }
      .wave-b { animation: waveSlide 30s linear infinite reverse; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes floatTitle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
      @keyframes breathe { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.5; } }
      @keyframes driftA { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(70px,30px) scale(1.12); } }
      @keyframes driftB { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-60px,-20px) scale(0.9); } }
      @keyframes driftC { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(40px,-35px); } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes spinRev { to { transform: rotate(-360deg); } }
      @keyframes waveSlide { from { transform: translateX(0); } to { transform: translateX(-640px); } }
      @media (prefers-reduced-motion: reduce) {
        * { animation: none !important; opacity: 1 !important; }
      }</style>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <g filter="url(#blur)">
  <circle cx="448" cy="216" r="183" fill="hsl(220, 80%, 50%)" opacity="0.16" class="blob-a"/>
  <circle cx="324" cy="82" r="134" fill="hsl(265, 85%, 60%)" opacity="0.14" class="blob-b"/>
  <circle cx="958" cy="58" r="217" fill="hsl(175, 80%, 62%)" opacity="0.12" class="blob-c"/>
  </g>
  <g><circle cx="888" cy="259" r="1.1" fill="hsl(220, 85%, 72%)" class="dot-a"/><circle cx="704" cy="194" r="1.5" fill="hsl(220, 85%, 72%)" class="dot-b"/><circle cx="814" cy="205" r="3.0" fill="hsl(220, 85%, 72%)" class="dot-c"/><circle cx="99" cy="84" r="1.9" fill="hsl(220, 85%, 72%)" class="dot-a"/><circle cx="1204" cy="288" r="2.0" fill="hsl(220, 85%, 72%)" class="dot-b"/><circle cx="706" cy="67" r="1.3" fill="hsl(220, 85%, 72%)" class="dot-c"/><circle cx="858" cy="64" r="2.8" fill="hsl(220, 85%, 72%)" class="dot-a"/><circle cx="335" cy="144" r="1.9" fill="hsl(220, 85%, 72%)" class="dot-b"/><circle cx="1180" cy="154" r="2.3" fill="hsl(220, 85%, 72%)" class="dot-c"/><circle cx="244" cy="219" r="1.6" fill="hsl(220, 85%, 72%)" class="dot-a"/><circle cx="711" cy="146" r="2.3" fill="hsl(220, 85%, 72%)" class="dot-b"/><circle cx="58" cy="205" r="1.8" fill="hsl(220, 85%, 72%)" class="dot-c"/><circle cx="92" cy="264" r="1.4" fill="hsl(220, 85%, 72%)" class="dot-a"/><circle cx="517" cy="205" r="1.1" fill="hsl(220, 85%, 72%)" class="dot-b"/><circle cx="480" cy="98" r="3.0" fill="hsl(220, 85%, 72%)" class="dot-c"/><circle cx="579" cy="111" r="2.0" fill="hsl(220, 85%, 72%)" class="dot-a"/><circle cx="704" cy="115" r="2.0" fill="hsl(220, 85%, 72%)" class="dot-b"/><circle cx="1082" cy="222" r="3.1" fill="hsl(220, 85%, 72%)" class="dot-c"/><circle cx="617" cy="157" r="2.0" fill="hsl(220, 85%, 72%)" class="dot-a"/><circle cx="628" cy="102" r="3.0" fill="hsl(220, 85%, 72%)" class="dot-b"/><circle cx="1129" cy="108" r="2.5" fill="hsl(220, 85%, 72%)" class="dot-c"/><circle cx="277" cy="226" r="1.7" fill="hsl(220, 85%, 72%)" class="dot-a"/></g>
  <g filter="url(#softShadow)">
  <rect x="48" y="40" width="183" height="44" rx="22" fill="#ffffff" stroke="hsl(220, 30%, 88%)"/>
  </g>
  <rect x="62" y="47" width="30" height="30" rx="9" fill="hsl(220, 80%, 50%)" fill-opacity="0.12" stroke="hsl(220, 80%, 50%)" stroke-opacity="0.35"/>
  <text x="77" y="67" text-anchor="middle" font-size="14" font-weight="800" fill="hsl(220, 45%, 12%)">R<tspan fill="hsl(220, 80%, 50%)">G</tspan></text>
  <text x="102" y="67" font-size="16" font-weight="700" fill="hsl(220, 45%, 12%)">Readme Gen</text>
  <g filter="url(#softShadow)">
  <rect x="1083" y="40" width="149" height="44" rx="22" fill="#ffffff" stroke="hsl(220, 30%, 88%)"/>
  </g>
  <text x="1157.5" y="67" text-anchor="middle" font-size="16" font-weight="700" fill="hsl(220, 45%, 12%)">@davidtorro</text>
  <g filter="url(#softShadow)" class="fade-1">
    <text x="640" y="186" text-anchor="middle" font-size="84" font-weight="800" letter-spacing="-3" fill="hsl(220, 45%, 12%)" class="float-title">README<tspan fill="hsl(220, 80%, 50%)"> GEN</tspan></text>
  </g>
  <text x="640" y="232" text-anchor="middle" font-size="19" fill="hsl(220, 15%, 40%)" class="fade-2">Generador de README.md profesional para proyectos Node.js. Analiza el código fuente</text>
  <text x="640" y="259" text-anchor="middle" font-size="19" fill="hsl(220, 15%, 40%)" class="fade-2">y las dependencias para crear un documento atractivo, con opciones de…</text>
</svg>