<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" font-family="'Helvetica Neue', -apple-system, 'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(10, 100%, 99%)"/><stop offset="1" stop-color="hsl(40, 85%, 94%)"/>
    </linearGradient>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="70"/></filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="hsl(10, 80%, 50%)" flood-opacity="0.18"/>
    </filter>
    <clipPath id="logoClip"><rect x="62" y="47" width="30" height="30" rx="9"/></clipPath>
    <style>
      .fade-1 { opacity: 0; animation: fadeIn 1.1s ease 0.1s forwards; }
      .fade-2 { opacity: 0; animation: fadeIn 1.1s ease 0.4s forwards; }
      .float-title { animation: floatTitle 7s ease-in-out 1.4s infinite; }
      .dot-a { animation: breathe 5s ease-in-out infinite; }
      .dot-b { animation: breathe 7s ease-in-out 2s infinite; }
      .dot-c { animation: breathe 6s ease-in-out 3.5s infinite; }
      .blob-a { animation: driftA 26s ease-in-out infinite; }
      .blob-b { animation: driftB 32s ease-in-out infinite; }
      .blob-c { animation: driftC 22s ease-in-out infinite; }
      .spin-a { animation: spin 16s linear infinite; }
      .spin-b { animation: spinRev 26s linear infinite; }
      .wave-a { animation: waveSlide 20s linear infinite; }
      .wave-b { animation: waveSlide 30s linear infinite reverse; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes floatTitle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
      @keyframes breathe { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.5; } }
      @keyframes driftA { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(70px,30px) scale(1.12); } }
      @keyframes driftB { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-60px,-20px) scale(0.9); } }
      @keyframes driftC { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(40px,-35px); } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes spinRev { to { transform: rotate(-360deg); } }
      @keyframes waveSlide { from { transform: translateX(0); } to { transform: translateX(-640px); } }
      @media (prefers-reduced-motion: reduce) {
        * { animation: none !important; opacity: 1 !important; }
      }</style>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <g transform="translate(1062 214) scale(0.85)"><circle r="60" fill="none" stroke="hsl(10, 80%, 50%)" stroke-opacity="0.22"/><circle r="98" fill="none" stroke="hsl(10, 80%, 50%)" stroke-opacity="0.13"/><circle r="136" fill="none" stroke="hsl(10, 80%, 50%)" stroke-opacity="0.07"/><g class="spin-a" style="transform-origin: 0px 0px"><circle cx="60" cy="0" r="5" fill="hsl(10, 80%, 50%)" fill-opacity="0.7"/></g><g class="spin-b" style="transform-origin: 0px 0px"><circle cx="-98" cy="0" r="4" fill="hsl(55, 85%, 60%)" fill-opacity="0.7"/></g></g><g transform="translate(179 78) scale(0.63)"><circle r="60" fill="none" stroke="hsl(10, 80%, 50%)" stroke-opacity="0.22"/><circle r="98" fill="none" stroke="hsl(10, 80%, 50%)" stroke-opacity="0.13"/><circle r="136" fill="none" stroke="hsl(10, 80%, 50%)" stroke-opacity="0.07"/><g class="spin-a" style="transform-origin: 0px 0px"><circle cx="60" cy="0" r="5" fill="hsl(10, 80%, 50%)" fill-opacity="0.7"/></g><g class="spin-b" style="transform-origin: 0px 0px"><circle cx="-98" cy="0" r="4" fill="hsl(55, 85%, 60%)" fill-opacity="0.7"/></g></g>
  <g><circle cx="999" cy="152" r="1.5" fill="hsl(10, 85%, 72%)" class="dot-a"/><circle cx="183" cy="264" r="2.7" fill="hsl(10, 85%, 72%)" class="dot-b"/><circle cx="863" cy="275" r="2.4" fill="hsl(10, 85%, 72%)" class="dot-c"/><circle cx="174" cy="224" r="1.6" fill="hsl(10, 85%, 72%)" class="dot-a"/><circle cx="1239" cy="191" r="1.8" fill="hsl(10, 85%, 72%)" class="dot-b"/><circle cx="97" cy="64" r="2.9" fill="hsl(10, 85%, 72%)" class="dot-c"/><circle cx="1058" cy="139" r="2.8" fill="hsl(10, 85%, 72%)" class="dot-a"/><circle cx="680" cy="54" r="2.5" fill="hsl(10, 85%, 72%)" class="dot-b"/><circle cx="791" cy="162" r="1.4" fill="hsl(10, 85%, 72%)" class="dot-c"/><circle cx="782" cy="122" r="1.3" fill="hsl(10, 85%, 72%)" class="dot-a"/><circle cx="207" cy="235" r="2.4" fill="hsl(10, 85%, 72%)" class="dot-b"/><circle cx="411" cy="154" r="1.5" fill="hsl(10, 85%, 72%)" class="dot-c"/><circle cx="901" cy="78" r="2.6" fill="hsl(10, 85%, 72%)" class="dot-a"/><circle cx="1184" cy="143" r="2.3" fill="hsl(10, 85%, 72%)" class="dot-b"/><circle cx="594" cy="134" r="1.2" fill="hsl(10, 85%, 72%)" class="dot-c"/><circle cx="567" cy="228" r="2.9" fill="hsl(10, 85%, 72%)" class="dot-a"/><circle cx="733" cy="113" r="2.4" fill="hsl(10, 85%, 72%)" class="dot-b"/><circle cx="623" cy="230" r="1.1" fill="hsl(10, 85%, 72%)" class="dot-c"/><circle cx="1132" cy="75" r="1.0" fill="hsl(10, 85%, 72%)" class="dot-a"/><circle cx="365" cy="158" r="2.5" fill="hsl(10, 85%, 72%)" class="dot-b"/><circle cx="1036" cy="215" r="2.9" fill="hsl(10, 85%, 72%)" class="dot-c"/><circle cx="1115" cy="144" r="1.2" fill="hsl(10, 85%, 72%)" class="dot-a"/><circle cx="439" cy="210" r="2.6" fill="hsl(10, 85%, 72%)" class="dot-b"/><circle cx="1066" cy="159" r="1.8" fill="hsl(10, 85%, 72%)" class="dot-c"/><circle cx="198" cy="265" r="2.1" fill="hsl(10, 85%, 72%)" class="dot-a"/><circle cx="1109" cy="56" r="1.3" fill="hsl(10, 85%, 72%)" class="dot-b"/></g>
  <g filter="url(#softShadow)">
  <rect x="48" y="40" width="183" height="44" rx="22" fill="#ffffff" stroke="hsl(10, 30%, 88%)"/>
  </g>
  <rect x="62" y="47" width="30" height="30" rx="9" fill="hsl(10, 80%, 50%)" fill-opacity="0.12" stroke="hsl(10, 80%, 50%)" stroke-opacity="0.35"/>
  <text x="77" y="67" text-anchor="middle" font-size="14" font-weight="800" fill="hsl(10, 45%, 12%)">R<tspan fill="hsl(10, 80%, 50%)">G</tspan></text>
  <text x="102" y="67" font-size="16" font-weight="700" fill="hsl(10, 45%, 12%)">Readme Gen</text>
  <g filter="url(#softShadow)">
  <rect x="1083" y="40" width="149" height="44" rx="22" fill="#ffffff" stroke="hsl(10, 30%, 88%)"/>
  </g>
  <text x="1157.5" y="67" text-anchor="middle" font-size="16" font-weight="700" fill="hsl(10, 45%, 12%)">@davidtorro</text>
  <g filter="url(#softShadow)" class="fade-1">
    <text x="640" y="186" text-anchor="middle" font-size="84" font-weight="800" letter-spacing="-3" fill="hsl(10, 45%, 12%)" class="float-title">README<tspan fill="hsl(10, 80%, 50%)"> GEN</tspan></text>
  </g>
  <text x="640" y="232" text-anchor="middle" font-size="19" fill="hsl(10, 15%, 40%)" class="fade-2">Genera README profesionales para proyectos con IA local y configuración rápida.</text>
</svg>