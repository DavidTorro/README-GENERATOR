<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" font-family="'Helvetica Neue', -apple-system, 'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="hsl(221, 45%, 8%)"/><stop offset="1" stop-color="hsl(261, 40%, 13%)"/>
    </linearGradient>
    <filter id="blur" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="70"/></filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .fade-1 { opacity: 0; animation: fadeIn 1.1s ease 0.1s forwards; }
      .fade-2 { opacity: 0; animation: fadeIn 1.1s ease 0.4s forwards; }
      .float-title { animation: floatTitle 7s ease-in-out 1.4s infinite; }
      .dot-a { animation: breathe 5s ease-in-out infinite; }
      .dot-b { animation: breathe 7s ease-in-out 2s infinite; }
      .dot-c { animation: breathe 6s ease-in-out 3.5s infinite; }
      .blob-a { animation: driftA 26s ease-in-out infinite; }
      .blob-b { animation: driftB 32s ease-in-out infinite; }
      .blob-c { animation: driftC 22s ease-in-out infinite; }
      .spin-a { animation: spin 16s linear infinite; }
      .spin-b { animation: spinRev 26s linear infinite; }
      .wave-a { animation: waveSlide 20s linear infinite; }
      .wave-b { animation: waveSlide 30s linear infinite reverse; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes floatTitle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
      @keyframes breathe { 0%, 100% { opacity: 0.15; } 50% { opacity: 0.5; } }
      @keyframes driftA { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(70px,30px) scale(1.12); } }
      @keyframes driftB { 0%, 100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-60px,-20px) scale(0.9); } }
      @keyframes driftC { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(40px,-35px); } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes spinRev { to { transform: rotate(-360deg); } }
      @keyframes waveSlide { from { transform: translateX(0); } to { transform: translateX(-640px); } }
      @media (prefers-reduced-motion: reduce) {
        * { animation: none !important; opacity: 1 !important; }
      }</style>
  </defs>
  <rect width="1280" height="320" fill="url(#bg)"/>
  <g filter="url(#blur)">
  <circle cx="857" cy="133" r="137" fill="hsl(221, 90%, 62%)" opacity="0.32" class="blob-a"/>
  <circle cx="305" cy="266" r="145" fill="hsl(266, 85%, 64%)" opacity="0.28" class="blob-b"/>
  <circle cx="892" cy="282" r="196" fill="hsl(176, 80%, 60%)" opacity="0.24" class="blob-c"/>
  </g>
  <g><circle cx="498" cy="165" r="1.1" fill="hsl(221, 80%, 70%)" class="dot-a"/><circle cx="192" cy="149" r="2.0" fill="hsl(221, 80%, 70%)" class="dot-b"/><circle cx="1128" cy="288" r="2.3" fill="hsl(221, 80%, 70%)" class="dot-c"/><circle cx="843" cy="238" r="2.0" fill="hsl(221, 80%, 70%)" class="dot-a"/><circle cx="1088" cy="250" r="1.4" fill="hsl(221, 80%, 70%)" class="dot-b"/><circle cx="836" cy="161" r="1.5" fill="hsl(221, 80%, 70%)" class="dot-c"/><circle cx="568" cy="142" r="2.5" fill="hsl(221, 80%, 70%)" class="dot-a"/><circle cx="476" cy="257" r="1.1" fill="hsl(221, 80%, 70%)" class="dot-b"/><circle cx="282" cy="41" r="2.4" fill="hsl(221, 80%, 70%)" class="dot-c"/><circle cx="106" cy="86" r="1.5" fill="hsl(221, 80%, 70%)" class="dot-a"/><circle cx="1143" cy="216" r="1.1" fill="hsl(221, 80%, 70%)" class="dot-b"/><circle cx="732" cy="130" r="1.8" fill="hsl(221, 80%, 70%)" class="dot-c"/><circle cx="1043" cy="189" r="2.7" fill="hsl(221, 80%, 70%)" class="dot-a"/><circle cx="1085" cy="280" r="1.5" fill="hsl(221, 80%, 70%)" class="dot-b"/></g>
  <g filter="url(#softShadow)">
  <rect x="48" y="40" width="183" height="44" rx="22" fill="rgba(255,255,255,0.08)" stroke="hsl(221, 40%, 32%)"/>
  </g>
  <rect x="62" y="47" width="30" height="30" rx="9" fill="hsl(221, 90%, 62%)" fill-opacity="0.12" stroke="hsl(221, 90%, 62%)" stroke-opacity="0.35"/>
  <text x="77" y="67" text-anchor="middle" font-size="14" font-weight="800" fill="#ffffff">R<tspan fill="hsl(221, 90%, 62%)">G</tspan></text>
  <text x="102" y="67" font-size="16" font-weight="700" fill="#ffffff">Readme Gen</text>
  <g filter="url(#softShadow)">
  <rect x="1083" y="40" width="149" height="44" rx="22" fill="rgba(255,255,255,0.08)" stroke="hsl(221, 40%, 32%)"/>
  </g>
  <text x="1157.5" y="67" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">@davidtorro</text>
  <g filter="url(#softShadow)" class="fade-1">
    <text x="640" y="186" text-anchor="middle" font-size="84" font-weight="800" letter-spacing="-3" fill="#ffffff" class="float-title">README<tspan fill="hsl(221, 90%, 62%)"> GEN</tspan></text>
  </g>
  <text x="640" y="232" text-anchor="middle" font-size="19" fill="hsl(221, 25%, 82%)" class="fade-2">Generador de README.md profesional para proyectos Node.js. Analiza el código fuente,</text>
  <text x="640" y="259" text-anchor="middle" font-size="19" fill="hsl(221, 25%, 82%)" class="fade-2">detecta tecnologías y crea un archivo README atractivo con secciones estructuradas.…</text>
</svg>